<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLZ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#000;width:100vw;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}

#stage{
  width:1080px;height:1920px;
  background:#050505;
  position:relative;overflow:hidden;
  transform-origin:top left;
}

/* canvases */
#fragCv,#grainCv{
  position:absolute;top:0;left:0;
  pointer-events:none;
}
#fragCv{width:1080px;height:1920px;z-index:2}
#grainCv{width:100%;height:100%;z-index:3;opacity:.38}

/* deep vignette */
#stage::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 48%,transparent 30%,rgba(0,0,0,.72) 100%);
  pointer-events:none;z-index:4;
}

/* geo SVG */
#geo{
  position:absolute;top:0;left:0;
  width:1080px;height:1920px;
  z-index:22;pointer-events:none;
}

/* ── opening text ── */
#t1{
  position:absolute;
  left:0;top:198px;
  width:1080px;text-align:center;
  font-family:'Inter',sans-serif;
  font-size:56px;font-weight:200;
  color:rgba(255,255,255,.82);
  letter-spacing:-.5px;
  z-index:30;
  opacity:0;
  transition:opacity .9s ease;
}

/* ── end text ── */
#t2{
  position:absolute;
  left:0;top:1455px;
  width:1080px;text-align:center;
  font-family:'Inter',sans-serif;
  font-size:40px;font-weight:200;
  color:rgba(255,255,255,.7);
  letter-spacing:.3px;
  z-index:30;
  opacity:0;
  transition:opacity 1s ease;
}

/* ── clarity badge ── */
#badge{
  position:absolute;
  left:540px;top:1320px;
  transform:translate(-50%,0) translateY(14px);
  z-index:30;
  display:flex;align-items:center;gap:10px;
  padding:11px 26px;
  border-radius:32px;
  background:rgba(0,216,167,.08);
  border:1px solid rgba(0,216,167,.35);
  font-family:'Inter',sans-serif;
  font-size:23px;font-weight:300;
  color:#00D8A7;
  letter-spacing:.5px;
  white-space:nowrap;
  opacity:0;
  transition:opacity .8s ease,transform .9s cubic-bezier(0.16,1,0.3,1);
}
#badge.on{opacity:1;transform:translate(-50%,0) translateY(0)}
.bdot{width:8px;height:8px;background:#00D8A7;border-radius:50%;flex-shrink:0}

/* ════ iPhone 12 Pro ════ */
#pw{
  position:absolute;
  left:540px;top:778px;
  transform:translate(-50%,-50%) translateY(220px) scale(0.9);
  opacity:0;
  z-index:15;
  transition:opacity 1.3s ease,transform 1.7s cubic-bezier(0.16,1,0.3,1);
}
#pw.in{
  opacity:1;
  transform:translate(-50%,-50%) translateY(0) scale(1);
}
#pw.sway{
  transform:translate(-50%,-50%) translateY(-6px) scale(1.008) perspective(1400px) rotateY(2.5deg);
  transition:transform 2.8s cubic-bezier(0.37,0,0.63,1);
}

.pglow{
  position:absolute;bottom:-100px;left:50%;
  transform:translateX(-50%);
  width:500px;height:220px;
  background:radial-gradient(ellipse,rgba(0,216,167,.1) 0%,transparent 68%);
  pointer-events:none;z-index:-1;
  opacity:0;transition:opacity 1.2s ease;
}
#pw.in .pglow{opacity:1}

/* phone body */
.iphone{
  width:452px;height:938px;
  position:relative;border-radius:52px;
  background:linear-gradient(158deg,#2d2d2f 0%,#1a1a1c 45%,#262628 100%);
  box-shadow:
    0 0 0 1.5px rgba(255,255,255,.07),
    inset 0 0 0 2px rgba(255,255,255,.04),
    0 60px 120px rgba(0,0,0,.96),
    0 20px 40px rgba(0,0,0,.7),
    0 0 70px rgba(0,216,167,.04);
  transition:box-shadow 1.2s ease;
}
.iphone::before{
  content:'';position:absolute;inset:0;
  border-radius:52px;padding:2px;
  background:linear-gradient(162deg,#aaa 0%,#555 18%,#888 36%,#444 54%,#999 72%,#4a4a4a 90%,#888 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;mask-composite:exclude;
}
.iphone.glow{
  box-shadow:
    0 0 0 1.5px rgba(0,216,167,.25),
    inset 0 0 0 2px rgba(255,255,255,.04),
    0 60px 120px rgba(0,0,0,.96),
    0 20px 40px rgba(0,0,0,.7),
    0 0 140px rgba(0,216,167,.2);
}

.isc{
  position:absolute;
  top:10px;left:10px;right:10px;bottom:10px;
  border-radius:42px;background:#000;overflow:hidden;
}
.notch{
  position:absolute;top:0;left:50%;
  transform:translateX(-50%);
  width:155px;height:32px;
  background:#000;border-radius:0 0 22px 22px;z-index:8;
}
.ncam{
  position:absolute;top:9px;left:50%;
  transform:translateX(-50%);
  width:11px;height:11px;
  background:#111;border-radius:50%;
}
.hbar{
  position:absolute;bottom:10px;left:50%;
  transform:translateX(-50%);
  width:132px;height:5px;
  background:rgba(255,255,255,.3);border-radius:3px;z-index:10;
}
.b{position:absolute;border-radius:2px;background:linear-gradient(90deg,#282828,#545454,#282828)}
.bsl{left:-3px;top:104px;width:3px;height:38px}
.bvu{left:-3px;top:160px;width:3px;height:62px}
.bvd{left:-3px;top:240px;width:3px;height:62px}
.bpw{right:-3px;top:192px;width:3px;height:82px}

#scVid,#scImg{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
}
#scVid{z-index:1;opacity:1}
#scImg{z-index:2;opacity:0;transition:opacity 1s ease}
#scImg.on{opacity:1}

.stop{
  position:absolute;top:0;left:0;right:0;height:56px;
  background:linear-gradient(#000 55%,transparent);
  z-index:7;pointer-events:none;
}
.sref{
  position:absolute;inset:0;
  background:linear-gradient(136deg,rgba(255,255,255,.048) 0%,transparent 36%,transparent 70%,rgba(255,255,255,.016) 100%);
  border-radius:42px;pointer-events:none;z-index:20;
}
</style>
</head>
<body>
<div id="stage">

  <canvas id="fragCv"></canvas>
  <canvas id="grainCv"></canvas>

  <!-- geo overlay SVG — corner brackets + scan lines around phone -->
  <!-- Phone sits at left=314,top=309 → right=766,bottom=1247 (phone centered at 540,778) -->
  <svg id="geo" viewBox="0 0 1080 1920">
    <!-- corner brackets (22px margin outside phone) -->
    <polyline id="gTL" points="354,287 292,287 292,357"  fill="none" stroke="#00D8A7" stroke-width="1.6" opacity="0"/>
    <polyline id="gTR" points="726,287 788,287 788,357"  fill="none" stroke="#00D8A7" stroke-width="1.6" opacity="0"/>
    <polyline id="gBL" points="292,1177 292,1269 354,1269" fill="none" stroke="#00D8A7" stroke-width="1.6" opacity="0"/>
    <polyline id="gBR" points="788,1177 788,1269 726,1269" fill="none" stroke="#00D8A7" stroke-width="1.6" opacity="0"/>
    <!-- horizontal scan lines (left and right of phone) -->
    <line id="gSL" x1="100" y1="778" x2="272" y2="778" fill="none" stroke="#00D8A7" stroke-width="1" opacity="0"/>
    <line id="gSR" x1="808" y1="778" x2="980" y2="778" fill="none" stroke="#00D8A7" stroke-width="1" opacity="0"/>
    <!-- small tick marks -->
    <line id="gVL" x1="292" y1="608" x2="292" y2="650" fill="none" stroke="#00D8A7" stroke-width="1" opacity="0"/>
    <line id="gVR" x1="788" y1="608" x2="788" y2="650" fill="none" stroke="#00D8A7" stroke-width="1" opacity="0"/>
  </svg>

  <!-- opening text -->
  <div id="t1">Your mind feels messy.</div>

  <!-- phone -->
  <div id="pw">
    <div class="iphone" id="iBody">
      <div class="b bsl"></div><div class="b bvu"></div>
      <div class="b bvd"></div><div class="b bpw"></div>
      <div class="isc">
        <div class="notch"><div class="ncam"></div></div>
        <div class="stop"></div>
        <video id="scVid" autoplay muted playsinline loop src="app-recording.mp4"></video>
        <img id="scImg" src="screen4.png" alt="">
        <div class="sref"></div>
        <div class="hbar"></div>
      </div>
    </div>
    <div class="pglow"></div>
  </div>

  <!-- clarity badge -->
  <div id="badge"><span class="bdot"></span>Clarity &nbsp;→&nbsp; Focused</div>

  <!-- end text -->
  <div id="t2">Find clarity beneath the noise.</div>

</div>

<script>
;(function(){

function $(id){return document.getElementById(id)}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}

/* ── scale stage ── */
function fit(){
  var s=$('stage'),sc=Math.min(window.innerWidth/1080,window.innerHeight/1920)
  s.style.transform='scale('+sc+')'
  s.style.position='absolute'
  s.style.left=Math.round((window.innerWidth-1080*sc)/2)+'px'
  s.style.top =Math.round((window.innerHeight-1920*sc)/2)+'px'
}
fit();window.addEventListener('resize',fit)

/* ── film grain ── */
;(function(){
  var c=$('grainCv'),ctx=c.getContext('2d')
  c.width=512;c.height=512
  ;(function g(){
    var img=ctx.createImageData(512,512),d=img.data
    for(var i=0;i<d.length;i+=4){var v=Math.random()*30|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=15}
    ctx.putImageData(img,0,0)
    setTimeout(g,60)
  })()
})()

/* ── fragment system ── */
var fc=$('fragCv'),fx=fc.getContext('2d')
fc.width=1080;fc.height=1920

var CHARS=['a','e','i','o','n','t','s','r','·','—','l','d','f','y','c','m']
var frags=[],organizing=false,fadeFrags=false

/* Build organized target grid (left/right columns clear of phone x=314–766) */
var targets=[]
// left col: x=50–230, y=330–1220 (16 slots)
for(var r=0;r<8;r++){
  targets.push({tx:55+Math.random()*60,  ty:330+r*130})
  targets.push({tx:140+Math.random()*60, ty:360+r*130})
}
// right col: x=790–1020
for(var r=0;r<8;r++){
  targets.push({tx:800+Math.random()*60, ty:330+r*130})
  targets.push({tx:900+Math.random()*60, ty:360+r*130})
}

function buildFrags(){
  frags=[]
  for(var i=0;i<32;i++){
    var t=targets[i]
    frags.push({
      x:Math.random()*1080,y:Math.random()*1920,
      vx:(Math.random()-.5)*1.8,vy:(Math.random()-.5)*1.8,
      tx:t.tx,ty:t.ty,
      ch:CHARS[Math.floor(Math.random()*CHARS.length)],
      sz:14+Math.random()*22,
      a:0.05+Math.random()*0.18,
      ta:0.03+Math.random()*0.06  /* target alpha when organized */
    })
  }
}
buildFrags()

var fadeAlpha=1  /* global multiplier for fading out fragments at end */

;(function tick(){
  fx.clearRect(0,0,1080,1920)
  for(var i=0;i<frags.length;i++){
    var f=frags[i]
    if(organizing){
      f.x+=(f.tx-f.x)*0.022
      f.y+=(f.ty-f.y)*0.022
      f.vx*=0.9;f.vy*=0.9
      f.a+=(f.ta-f.a)*0.018  /* alpha fades to subtle as organized */
    } else {
      f.x+=f.vx;f.y+=f.vy
      if(f.x<-20)f.x=1100;if(f.x>1100)f.x=-20
      if(f.y<-20)f.y=1940;if(f.y>1940)f.y=-20
    }
    if(fadeFrags)f.a*=0.97
    var drawAlpha=Math.max(0,f.a)*fadeAlpha
    if(drawAlpha<0.005)continue
    fx.font='100 '+f.sz+'px Inter,sans-serif'
    fx.fillStyle='rgba(255,255,255,'+drawAlpha.toFixed(3)+')'
    fx.fillText(f.ch,f.x,f.y)
  }
  requestAnimationFrame(tick)
})()

/* ── geo line helpers ── */
var GEO=['gTL','gTR','gBL','gBR','gSL','gSR','gVL','gVR']

function geoReset(){
  GEO.forEach(function(id){
    var el=$(id);if(!el)return
    var len=el.getTotalLength?el.getTotalLength():200
    el.setAttribute('stroke-dasharray',len)
    el.setAttribute('stroke-dashoffset',len)
    el.setAttribute('opacity','0')
    el.style.transition='none'
  })
}

function geoDraw(id,delay,dur){
  setTimeout(function(){
    var el=$(id);if(!el)return
    var len=el.getTotalLength?el.getTotalLength():200
    el.setAttribute('opacity','0.65')
    /* force reflow for transition to fire */
    el.getBoundingClientRect()
    el.style.transition='stroke-dashoffset '+(dur||800)+'ms cubic-bezier(0.4,0,0.2,1)'
    el.setAttribute('stroke-dashoffset','0')
  },delay)
}

/* ── reset all ── */
function resetAll(){
  organizing=false;fadeFrags=false;fadeAlpha=1
  buildFrags()
  geoReset()

  var pw=$('pw')
  pw.style.transition='none'
  pw.className=''
  pw.style.opacity='0'
  pw.style.transform='translate(-50%,-50%) translateY(220px) scale(0.9)'

  $('iBody').className='iphone'
  $('scImg').className=''

  $('t1').style.cssText='opacity:0;transition:none'
  $('t2').style.cssText='opacity:0;transition:none'
  $('badge').className=''
  $('badge').style.cssText='opacity:0;transition:none'

  $('stage').offsetHeight  // reflow

  /* clear inline overrides so CSS transitions re-arm */
  requestAnimationFrame(function(){
    $('t1').style.transition=''
    $('t2').style.transition=''
    $('badge').style.transition=''
    var pw=$('pw')
    pw.style.transition=''
    pw.style.opacity=''
    pw.style.transform=''
  })
}

/* ══════════════════════
   MAIN TIMELINE  ~8s
══════════════════════ */
async function run(){

  resetAll()
  await sleep(100)

  /* 0.1s ── opening text in */
  $('t1').style.opacity='1'

  /* 1.5s ── iPhone rises from darkness */
  await sleep(1300)
  var pw=$('pw')
  pw.className='in'

  /* 2.7s ── fragments begin organizing */
  await sleep(1100)
  organizing=true

  /* 3.4s ── geo lines draw in (staggered) */
  await sleep(650)
  geoDraw('gTL',  0,  750)
  geoDraw('gTR',  80, 750)
  geoDraw('gBL',  180,750)
  geoDraw('gBR',  260,750)
  geoDraw('gSL',  400,600)
  geoDraw('gSR',  400,600)
  geoDraw('gVL',  600,500)
  geoDraw('gVR',  600,500)

  /* 4.1s ── phone glows green + analysis screen */
  await sleep(650)
  $('iBody').classList.add('glow')
  $('scImg').classList.add('on')

  /* 4.4s ── clarity badge rises */
  await sleep(260)
  $('badge').classList.add('on')

  /* 4.9s ── subtle camera sway */
  await sleep(460)
  pw.className='in sway'

  /* 5.2s ── opening text fades, end text rises */
  await sleep(320)
  $('t1').style.opacity='0'
  await sleep(340)
  $('t2').style.opacity='1'

  /* 7.0s ── begin fade-out for loop */
  await sleep(1700)
  fadeFrags=true

  var stage=$('stage')
  stage.style.transition='opacity .85s ease'
  stage.style.opacity='0'

  await sleep(950)
  stage.style.transition=''
  stage.style.opacity=''
  run()
}

document.fonts.ready.then(run)

})();
</script>
</body>
</html>
