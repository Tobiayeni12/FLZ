<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FLZ — Ad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ── Ad frame ─────────────────────────────────────────────────────── */
    .ad {
      width: min(600px, 100vmin);
      height: min(600px, 100vmin);
      background: #080808;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }

    /* ── Polka dot background ─────────────────────────────────────────── */
    .dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.055) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: 0;
      transition: opacity 1.2s ease;
    }
    .dots.visible { opacity: 1; }

    /* ── Scenes ───────────────────────────────────────────────────────── */
    .scene {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(32px, 8%, 56px);
      opacity: 0;
      pointer-events: none;
    }

    /* ── Scene 1: Brand ───────────────────────────────────────────────── */
    #s1 .logo {
      font-size: clamp(4rem, 12vmin, 5.5rem);
      font-weight: 300;
      letter-spacing: -0.04em;
      color: #fff;
      line-height: 1;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.9s ease, transform 0.9s ease;
    }
    #s1 .tagline {
      font-size: clamp(0.65rem, 1.8vmin, 0.78rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      margin-top: 18px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease 0.5s, transform 0.8s ease 0.5s;
    }
    #s1 .logo.in   { opacity: 1; transform: translateY(0); }
    #s1 .tagline.in { opacity: 1; transform: translateY(0); }

    /* ── Scene 2: Check-in ────────────────────────────────────────────── */
    #s2 .prompt {
      font-size: clamp(0.6rem, 1.6vmin, 0.7rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      margin-bottom: 28px;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    #s2 .input-wrap {
      width: 100%;
      max-width: 380px;
      border-bottom: 1px solid rgba(255,255,255,0.18);
      padding-bottom: 12px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
    }
    #s2 .typed-text {
      font-size: clamp(1rem, 2.8vmin, 1.2rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.9);
      line-height: 1.5;
      min-height: 1.8em;
      flex: 1;
    }
    #s2 .cursor {
      display: inline-block;
      width: 1.5px;
      height: 1.1em;
      background: rgba(255,255,255,0.7);
      margin-left: 1px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }
    #s2 .arrow-btn {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
      line-height: 1;
      padding-bottom: 2px;
    }
    #s2 .prompt.in     { opacity: 1; }
    #s2 .input-wrap.in { opacity: 1; transform: translateY(0); }
    #s2 .arrow-btn.in  { opacity: 1; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Scene 3: Analyzing ───────────────────────────────────────────── */
    #s3 .dots-loader {
      display: flex;
      gap: 7px;
      align-items: center;
    }
    #s3 .dots-loader span {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: pulse 1.1s ease-in-out infinite;
    }
    #s3 .dots-loader span:nth-child(2) { animation-delay: 0.18s; }
    #s3 .dots-loader span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(1);   opacity: 0.35; }
      40%           { transform: scale(1.5); opacity: 0.9; }
    }

    /* ── Scene 4: Results ─────────────────────────────────────────────── */
    #s4 .state-label {
      font-size: clamp(1.4rem, 4vmin, 1.85rem);
      font-weight: 400;
      letter-spacing: -0.03em;
      color: #fff;
      margin-bottom: 32px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #s4 .dims {
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    #s4 .dim-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      opacity: 0;
      transform: translateX(-10px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    #s4 .dim-row:first-child { border-top: 1px solid rgba(255,255,255,0.07); }
    #s4 .dim-name {
      font-size: clamp(0.65rem, 1.6vmin, 0.72rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
    }
    #s4 .dim-val {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #s4 .dim-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #s4 .dim-text {
      font-size: clamp(0.8rem, 2vmin, 0.875rem);
      font-weight: 500;
      letter-spacing: -0.01em;
      text-transform: capitalize;
    }
    #s4 .insight {
      margin-top: 28px;
      max-width: 340px;
      font-size: clamp(0.75rem, 1.9vmin, 0.8125rem);
      font-style: italic;
      font-weight: 300;
      color: rgba(255,255,255,0.42);
      line-height: 1.7;
      text-align: center;
      opacity: 0;
      transition: opacity 0.7s ease 0.4s;
    }
    #s4 .state-label.in { opacity: 1; transform: translateY(0); }
    #s4 .dim-row.in     { opacity: 1; transform: translateX(0); }
    #s4 .insight.in     { opacity: 1; }

    /* ── Scene 5: CTA ─────────────────────────────────────────────────── */
    #s5 .cta-url {
      font-size: clamp(1.1rem, 3vmin, 1.35rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.9);
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    #s5 .cta-sub {
      margin-top: 12px;
      font-size: clamp(0.62rem, 1.5vmin, 0.7rem);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.25);
      opacity: 0;
      transition: opacity 0.8s ease 0.4s;
    }
    #s5 .cta-url.in { opacity: 1; transform: translateY(0); }
    #s5 .cta-sub.in { opacity: 1; }

    /* ── FLZ watermark (always visible) ──────────────────────────────── */
    .watermark {
      position: absolute;
      top: 22px; left: 26px;
      font-size: clamp(0.85rem, 2.2vmin, 1rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.18);
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<div class="ad" id="ad">
  <div class="dots" id="dots"></div>
  <div class="watermark">FLZ.</div>

  <!-- Scene 1: Brand -->
  <div class="scene" id="s1">
    <div class="logo" id="logo">FLZ.</div>
    <div class="tagline" id="tagline">know yourself better</div>
  </div>

  <!-- Scene 2: Check-in -->
  <div class="scene" id="s2">
    <div class="prompt" id="prompt">How are you feeling?</div>
    <div class="input-wrap" id="inputWrap">
      <div class="typed-text" id="typedText"><span class="cursor"></span></div>
      <div class="arrow-btn" id="arrowBtn">→</div>
    </div>
  </div>

  <!-- Scene 3: Analyzing -->
  <div class="scene" id="s3">
    <div class="dots-loader">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Scene 4: Results -->
  <div class="scene" id="s4">
    <div class="state-label" id="stateLabel">Restless Mind</div>
    <div class="dims">
      <div class="dim-row" id="d0">
        <span class="dim-name">Energy</span>
        <div class="dim-val">
          <div class="dim-dot" style="background:#f59e0b"></div>
          <span class="dim-text" style="color:#f59e0b">Low</span>
        </div>
      </div>
      <div class="dim-row" id="d1">
        <span class="dim-name">Emotion</span>
        <div class="dim-val">
          <div class="dim-dot" style="background:#6366f1"></div>
          <span class="dim-text" style="color:#6366f1">Neutral</span>
        </div>
      </div>
      <div class="dim-row" id="d2">
        <span class="dim-name">Clarity</span>
        <div class="dim-val">
          <div class="dim-dot" style="background:#10b981"></div>
          <span class="dim-text" style="color:#10b981">Confused</span>
        </div>
      </div>
    </div>
    <div class="insight" id="insight">
      "Your thoughts are racing. Slow down — one thing at a time."
    </div>
  </div>

  <!-- Scene 5: CTA -->
  <div class="scene" id="s5">
    <div class="cta-url" id="ctaUrl">feelz.chat</div>
    <div class="cta-sub" id="ctaSub">free to start · understand yourself</div>
  </div>
</div>

<script>
  const TYPING_TEXT = "feeling scattered and low on energy today…"
  const LOOP_DURATION = 11000 // ms total

  function show(el)  { el.style.opacity = '1'; el.style.pointerEvents = 'auto'; }
  function hide(el)  { el.style.opacity = '0'; el.style.pointerEvents = 'none'; }
  function add(el, cls)    { el.classList.add(cls); }
  function remove(el, cls) { el.classList.remove(cls); }

  function typeText(el, text, onDone) {
    // strip cursor span if present
    el.innerHTML = '<span class="cursor"></span>'
    const cursor = el.querySelector('.cursor')
    let i = 0
    const interval = setInterval(() => {
      cursor.insertAdjacentText('beforebegin', text[i])
      i++
      if (i >= text.length) {
        clearInterval(interval)
        if (onDone) onDone()
      }
    }, 48)
    return interval
  }

  function resetAll() {
    // Scenes
    ;['s1','s2','s3','s4','s5'].forEach(id => hide(document.getElementById(id)))
    // Scene 1
    remove(document.getElementById('logo'), 'in')
    remove(document.getElementById('tagline'), 'in')
    // Scene 2
    remove(document.getElementById('prompt'), 'in')
    remove(document.getElementById('inputWrap'), 'in')
    remove(document.getElementById('arrowBtn'), 'in')
    document.getElementById('typedText').innerHTML = '<span class="cursor"></span>'
    // Scene 4
    remove(document.getElementById('stateLabel'), 'in')
    remove(document.getElementById('d0'), 'in')
    remove(document.getElementById('d1'), 'in')
    remove(document.getElementById('d2'), 'in')
    remove(document.getElementById('insight'), 'in')
    // Scene 5
    remove(document.getElementById('ctaUrl'), 'in')
    remove(document.getElementById('ctaSub'), 'in')
  }

  function t(ms) {
    return new Promise(r => setTimeout(r, ms))
  }

  async function runLoop() {
    resetAll()

    // Dots background
    document.getElementById('dots').classList.add('visible')

    // ── Scene 1: Brand ───────────────────────────
    await t(300)
    show(document.getElementById('s1'))
    await t(50)
    add(document.getElementById('logo'), 'in')
    await t(500)
    add(document.getElementById('tagline'), 'in')
    await t(1800)

    // Fade out scene 1
    hide(document.getElementById('s1'))
    await t(600)

    // ── Scene 2: Check-in ────────────────────────
    show(document.getElementById('s2'))
    await t(50)
    add(document.getElementById('prompt'), 'in')
    await t(300)
    add(document.getElementById('inputWrap'), 'in')
    await t(500)

    // Type
    await new Promise(resolve => {
      typeText(document.getElementById('typedText'), TYPING_TEXT, resolve)
    })

    await t(400)
    add(document.getElementById('arrowBtn'), 'in')
    await t(800)

    hide(document.getElementById('s2'))
    await t(400)

    // ── Scene 3: Analyzing ───────────────────────
    show(document.getElementById('s3'))
    await t(1100)
    hide(document.getElementById('s3'))
    await t(300)

    // ── Scene 4: Results ─────────────────────────
    show(document.getElementById('s4'))
    await t(50)
    add(document.getElementById('stateLabel'), 'in')
    await t(300)
    add(document.getElementById('d0'), 'in')
    await t(180)
    add(document.getElementById('d1'), 'in')
    await t(180)
    add(document.getElementById('d2'), 'in')
    await t(600)
    add(document.getElementById('insight'), 'in')
    await t(2200)

    hide(document.getElementById('s4'))
    await t(500)

    // ── Scene 5: CTA ─────────────────────────────
    show(document.getElementById('s5'))
    await t(50)
    add(document.getElementById('ctaUrl'), 'in')
    await t(400)
    add(document.getElementById('ctaSub'), 'in')
    await t(1800)

    hide(document.getElementById('s5'))
    await t(700)

    // Loop
    runLoop()
  }

  runLoop()
</script>
</body>
</html>
