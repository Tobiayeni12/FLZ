<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>FLZ — Ad</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,200;0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
    }

    /* ── Stage: 1080×1920, scaled to fit ─────────── */
    #stage {
      width: 1080px; height: 1920px;
      background: #060608;
      position: absolute;
      top: 0; left: 0;
      overflow: hidden;
      transform-origin: top left;
    }

    /* ── Star/grain canvas ───────────────────────── */
    #bgCanvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    /* ── Vignette ────────────────────────────────── */
    #vignette {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, transparent 30%, rgba(0,0,0,0.72) 100%),
        linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 20%, transparent 70%, rgba(0,0,0,0.8) 100%);
    }

    /* ── Logo area ────────────────────────────────── */
    #logoArea {
      position: absolute;
      top: 112px; left: 80px;
      z-index: 20;
    }
    #logoText {
      font-size: 72px; font-weight: 200;
      letter-spacing: -0.045em; color: #fff;
      line-height: 1;
      opacity: 0; filter: blur(8px);
      transform: translateY(10px);
      transition: opacity 1.2s cubic-bezier(0.16,1,0.3,1),
                  transform 1.2s cubic-bezier(0.16,1,0.3,1),
                  filter 1.2s cubic-bezier(0.16,1,0.3,1);
    }
    #logoText.in { opacity: 1; transform: translateY(0); filter: blur(0); }

    #taglineText {
      font-size: 11.5px; font-weight: 400;
      letter-spacing: 0.21em; text-transform: uppercase;
      color: rgba(255,255,255,0.28);
      margin-top: 14px;
      opacity: 0; transform: translateY(14px);
      transition: opacity 1s ease 0s, transform 1s cubic-bezier(0.16,1,0.3,1) 0s;
    }
    #taglineText.in { opacity: 1; transform: translateY(0); }

    /* ── Phones container — camera push applied here */
    #phonesContainer {
      position: absolute;
      inset: 0; z-index: 10;
      transform-origin: 50% 60%;
    }
    #phonesContainer.push {
      transition: transform 8s cubic-bezier(0.25,0.1,0.1,1);
      transform: scale(1.09) translateY(-22px);
    }

    /* ── Phone base ──────────────────────────────── */
    .phone {
      position: absolute;
      border-radius: 48px;
      /* Metal frame: gradient to simulate brushed aluminum */
      background: linear-gradient(
        150deg,
        rgba(90,90,95,0.9) 0%,
        rgba(45,45,48,1) 25%,
        rgba(28,28,30,1) 55%,
        rgba(38,38,42,0.95) 80%,
        rgba(65,65,70,0.8) 100%
      );
      padding: 3px;
      box-shadow:
        0 0 0 0.5px rgba(255,255,255,0.08),
        0 60px 140px rgba(0,0,0,0.88),
        0 24px 56px rgba(0,0,0,0.65),
        0 8px 20px rgba(0,0,0,0.5),
        inset 0 1.5px 0 rgba(255,255,255,0.14),
        inset 0 -1px 0 rgba(0,0,0,0.6);
      will-change: transform, opacity;
    }

    /* Edge reflection — left side */
    .phone::before {
      content: '';
      position: absolute;
      left: 0; top: 8%; bottom: 8%;
      width: 3px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(255,255,255,0.22) 22%,
        rgba(255,255,255,0.28) 48%,
        rgba(255,255,255,0.18) 72%,
        transparent 100%
      );
      border-radius: 3px 0 0 3px;
      z-index: 6; pointer-events: none;
    }
    /* Edge reflection — right side subtle */
    .phone::after {
      content: '';
      position: absolute;
      right: 0; top: 20%; bottom: 20%;
      width: 1.5px;
      background: linear-gradient(180deg,
        transparent 0%,
        rgba(255,255,255,0.08) 50%,
        transparent 100%
      );
      border-radius: 0 3px 3px 0;
      z-index: 6; pointer-events: none;
    }

    .phone-inner {
      width: 100%; height: 100%;
      background: #080808;
      border-radius: 45px;
      overflow: hidden;
      position: relative;
    }

    /* Dynamic island */
    .dynamic-island {
      position: absolute;
      top: 14px; left: 50%;
      transform: translateX(-50%);
      width: 100px; height: 30px;
      background: #000;
      border-radius: 20px;
      z-index: 15;
    }

    /* ── Secondary phone (analytics) ─────────────── */
    #phoneSecondary {
      width: 260px; height: 528px;
      left: 55px; top: 570px;
      opacity: 0;
      transform: perspective(1200px) rotateY(-8deg) rotateX(4deg) translateY(35px);
      transition: opacity 1.3s ease, transform 1.5s cubic-bezier(0.16,1,0.3,1);
    }
    #phoneSecondary.in {
      opacity: 0.72;
      transform: perspective(1200px) rotateY(-8deg) rotateX(4deg) translateY(0);
    }
    #phoneSecondary.float {
      animation: floatSecondary 5s ease-in-out infinite;
    }
    @keyframes floatSecondary {
      0%,100% { transform: perspective(1200px) rotateY(-8deg) rotateX(4deg) translateY(0); }
      50%      { transform: perspective(1200px) rotateY(-8deg) rotateX(4deg) translateY(-10px); }
    }

    /* ── Primary phone (check-in) ────────────────── */
    #phonePrimary {
      width: 310px; height: 630px;
      left: 380px; top: 660px;
      opacity: 0;
      transform: perspective(1200px) rotateY(-6deg) rotateX(3deg) translateY(55px) rotate(0.5deg);
      transition: opacity 1.1s ease 0.25s, transform 1.4s cubic-bezier(0.16,1,0.3,1) 0.25s;
    }
    #phonePrimary.in {
      opacity: 1;
      transform: perspective(1200px) rotateY(-6deg) rotateX(3deg) translateY(0) rotate(0.5deg);
    }
    #phonePrimary.float {
      animation: floatPrimary 5s ease-in-out 0.6s infinite;
    }
    @keyframes floatPrimary {
      0%,100% { transform: perspective(1200px) rotateY(-6deg) rotateX(3deg) translateY(0) rotate(0.5deg); }
      50%      { transform: perspective(1200px) rotateY(-6deg) rotateX(3deg) translateY(-13px) rotate(0.5deg); }
    }

    /* ── Screen content base ─────────────────────── */
    .screen-pad {
      position: absolute;
      inset: 0;
      padding: 54px 18px 20px;
      overflow: hidden;
    }

    /* ── Primary screen: check-in ────────────────── */
    #primScreen { background: #070709; }

    .p-statusbar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 4px; margin-bottom: 28px;
    }
    .p-time {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.7); letter-spacing: -0.01em;
    }
    .p-icons { display: flex; gap: 5px; align-items: center; }
    .p-icon {
      width: 14px; height: 8px;
      background: rgba(255,255,255,0.55);
      border-radius: 2px;
    }
    .p-icon.signal { width: 12px; background: transparent;
      border-right: 2px solid rgba(255,255,255,0.55);
      border-left: 2px solid rgba(255,255,255,0.55); }

    .p-logo {
      font-size: 15px; font-weight: 300; letter-spacing: -0.025em;
      color: rgba(255,255,255,0.35); margin-bottom: 38px;
    }

    .p-question {
      font-size: 18.5px; font-weight: 300; letter-spacing: -0.03em;
      color: rgba(255,255,255,0.9); line-height: 1.38;
      margin-bottom: 30px;
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .p-question.in { opacity: 1; transform: translateY(0); }

    .p-input-area {
      border-bottom: 1px solid rgba(255,255,255,0.12);
      padding-bottom: 14px; margin-bottom: 10px;
      min-height: 52px;
      transition: box-shadow 0.25s ease, border-color 0.25s ease;
    }
    .p-input-area.glow {
      border-color: rgba(255,255,255,0.22);
      box-shadow: 0 4px 20px rgba(255,255,255,0.025);
    }

    .p-typed {
      font-size: 15.5px; font-weight: 300; letter-spacing: -0.02em;
      color: rgba(255,255,255,0.82); line-height: 1.55;
    }
    .p-cursor {
      display: inline-block; width: 1.5px; height: 1em;
      background: rgba(255,255,255,0.65);
      margin-left: 1px; vertical-align: middle;
      animation: blink 0.88s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .p-hint {
      font-size: 11px; letter-spacing: 0.02em;
      color: rgba(255,255,255,0.16);
    }

    /* Pulse ring on completion */
    .pulse-ring {
      position: absolute;
      left: 50%; top: 45%;
      transform: translate(-50%,-50%) scale(0.5);
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      opacity: 0;
      animation: pulseOut 1.3s cubic-bezier(0.4,0,0.2,1) forwards;
      pointer-events: none; z-index: 20;
    }
    @keyframes pulseOut {
      0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 0.5; }
      100% { transform: translate(-50%,-50%) scale(4.5); opacity: 0; }
    }

    /* Result area on primary phone */
    #primResult {
      margin-top: 22px;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    #primResult.in { opacity: 1; transform: translateY(0); }

    .r-state {
      font-size: 13px; font-weight: 400; letter-spacing: -0.015em;
      color: rgba(255,255,255,0.75); margin-bottom: 14px;
    }
    .r-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .r-row span:first-child {
      font-size: 9.5px; letter-spacing: 0.09em;
      text-transform: uppercase; color: rgba(255,255,255,0.26);
    }
    .r-row span:last-child { font-size: 10.5px; font-weight: 500; }

    /* ── Secondary screen: analytics ────────────── */
    #secScreen { background: #060608; }

    /* Vertical mask reveal */
    #secMask {
      position: absolute; inset: 0;
      clip-path: inset(100% 0 0 0);
      transition: clip-path 1.4s cubic-bezier(0.16,1,0.3,1);
    }
    #secMask.in { clip-path: inset(0% 0 0 0); }

    .b-logo {
      font-size: 13px; font-weight: 300; letter-spacing: -0.02em;
      color: rgba(255,255,255,0.3); margin-bottom: 22px;
    }
    .b-header {
      font-size: 16px; font-weight: 300; letter-spacing: -0.025em;
      color: rgba(255,255,255,0.78); margin-bottom: 5px;
    }
    .b-sub {
      font-size: 9.5px; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.22); margin-bottom: 16px;
    }
    .b-streak {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 9.5px; color: rgba(255,255,255,0.38);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px; padding: 4px 10px; margin-bottom: 18px;
    }

    /* Chart */
    .b-chart-wrap {
      width: 100%; margin-bottom: 16px; position: relative;
    }
    .b-chart-svg { width: 100%; display: block; }

    /* Animated chart lines */
    .chart-line {
      fill: none; stroke-width: 1.8;
      stroke-linecap: round; stroke-linejoin: round;
      stroke-dasharray: 260;
      stroke-dashoffset: 260;
      transition: stroke-dashoffset 1.1s cubic-bezier(0.4,0,0.2,1);
    }
    .chart-line.draw { stroke-dashoffset: 0; }

    /* Chart label row */
    .b-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6.5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      opacity: 0; transform: translateX(-6px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .b-row.in { opacity: 1; transform: translateX(0); }
    .b-row span:first-child {
      font-size: 9px; letter-spacing: 0.09em;
      text-transform: uppercase; color: rgba(255,255,255,0.25);
    }
    .b-row span:last-child { font-size: 10px; font-weight: 500; }

    /* Light sweep on secondary */
    #secSweep {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      background: linear-gradient(
        120deg,
        transparent 20%,
        rgba(255,255,255,0.045) 50%,
        transparent 80%
      );
      transform: translateX(-160%);
      transition: transform 1.6s cubic-bezier(0.4,0,0.2,1);
    }
    #secSweep.in { transform: translateX(160%); }

    /* ── Fade overlay ────────────────────────────── */
    #fade {
      position: absolute; inset: 0;
      background: #000; opacity: 0;
      pointer-events: none; z-index: 98;
      transition: opacity 1.1s ease;
    }
    #fade.in { opacity: 1; }
  </style>
</head>
<body>

<div id="stage">
  <canvas id="bgCanvas"></canvas>
  <div id="vignette"></div>

  <!-- Logo -->
  <div id="logoArea">
    <div id="logoText">FLZ.</div>
    <div id="taglineText">KNOW YOURSELF BETTER</div>
  </div>

  <!-- Phones -->
  <div id="phonesContainer">

    <!-- Secondary phone: analytics -->
    <div id="phoneSecondary" class="phone">
      <div class="phone-inner">
        <div class="dynamic-island"></div>
        <div id="secScreen" class="screen-pad">
          <div id="secSweep"></div>
          <div id="secMask" class="screen-pad" style="padding-top:54px">
            <div class="b-logo">FLZ.</div>
            <div class="b-header">Growth history</div>
            <div class="b-sub">7 moments recorded</div>
            <div class="b-streak">🔥 7 day streak</div>

            <div class="b-chart-wrap">
              <svg class="b-chart-svg" viewBox="0 0 224 68" xmlns="http://www.w3.org/2000/svg">
                <!-- grid -->
                <line x1="0" y1="17" x2="224" y2="17" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
                <line x1="0" y1="34" x2="224" y2="34" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
                <line x1="0" y1="51" x2="224" y2="51" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
                <!-- area fills -->
                <polyline points="0,54 37,46 74,42 111,28 148,32 185,18 224,13"
                  fill="none" class="chart-line" id="lineEnergy" stroke="#f59e0b"/>
                <polyline points="0,50 37,52 74,38 111,42 148,24 185,28 224,18"
                  fill="none" class="chart-line" id="lineEmotion" stroke="#818cf8"/>
                <polyline points="0,58 37,54 74,52 111,46 148,38 185,24 224,16"
                  fill="none" class="chart-line" id="lineClarity" stroke="#34d399"/>
              </svg>
            </div>

            <div class="b-row" id="bRow0">
              <span>Energy</span><span style="color:#f59e0b">High</span>
            </div>
            <div class="b-row" id="bRow1">
              <span>Emotion</span><span style="color:#818cf8">Positive</span>
            </div>
            <div class="b-row" id="bRow2">
              <span>Clarity</span><span style="color:#34d399">Focused</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Primary phone: check-in -->
    <div id="phonePrimary" class="phone">
      <div class="phone-inner">
        <div class="dynamic-island"></div>
        <div id="primScreen" class="screen-pad">
          <div class="p-statusbar">
            <span class="p-time">9:41</span>
            <div class="p-icons">
              <div class="p-icon signal"></div>
              <div class="p-icon" style="width:10px;height:7px;border-radius:1px;background:rgba(255,255,255,0.5)"></div>
              <div class="p-icon" style="width:18px;height:8px;border-radius:2px;background:linear-gradient(90deg,rgba(255,255,255,0.55) 75%,transparent 75%);outline:1px solid rgba(255,255,255,0.3)"></div>
            </div>
          </div>

          <div class="p-logo">FLZ.</div>

          <div class="p-question" id="pQuestion">
            What's on your<br>mind, Tobi?
          </div>

          <div class="p-input-area" id="pInputArea">
            <div class="p-typed" id="pTyped"><span class="p-cursor"></span></div>
          </div>
          <div class="p-hint">Share how you're feeling</div>

          <div id="primResult">
            <div class="r-state">Restless Mind</div>
            <div class="r-row"><span>Energy</span><span style="color:#f59e0b">Low</span></div>
            <div class="r-row"><span>Emotion</span><span style="color:#818cf8">Neutral</span></div>
            <div class="r-row"><span>Clarity</span><span style="color:#34d399">Confused</span></div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /phonesContainer -->

  <div id="fade"></div>
</div>

<script>
// ── Fit stage to viewport ───────────────────────────────────────────────────
function fitStage() {
  const s  = document.getElementById('stage')
  const sx = window.innerWidth  / 1080
  const sy = window.innerHeight / 1920
  const sc = Math.min(sx, sy)
  s.style.transform  = `scale(${sc})`
  s.style.marginLeft = ((window.innerWidth  - 1080 * sc) / 2) + 'px'
  s.style.marginTop  = ((window.innerHeight - 1920 * sc) / 2) + 'px'
}
fitStage()
window.addEventListener('resize', fitStage)

// ── Star + grain canvas ─────────────────────────────────────────────────────
(function buildBackground() {
  const canvas = document.getElementById('bgCanvas')
  canvas.width = 1080; canvas.height = 1920
  const ctx = canvas.getContext('2d')

  // Deep space gradient
  const grd = ctx.createRadialGradient(540,800,0, 540,800,1100)
  grd.addColorStop(0, 'rgba(16,14,22,1)')
  grd.addColorStop(1, 'rgba(4,4,6,1)')
  ctx.fillStyle = grd
  ctx.fillRect(0,0,1080,1920)

  // Stars — varied sizes & brightness
  const starData = [
    { n: 120, rMin: 0.4, rMax: 1.2,  oMin: 0.06, oMax: 0.18 },
    { n: 60,  rMin: 1.2, rMax: 2.0,  oMin: 0.08, oMax: 0.22 },
    { n: 12,  rMin: 2.0, rMax: 3.2,  oMin: 0.12, oMax: 0.30 },
  ]
  starData.forEach(({n,rMin,rMax,oMin,oMax}) => {
    for (let i=0; i<n; i++) {
      const x = Math.random()*1080
      const y = Math.random()*1920
      const r = rMin + Math.random()*(rMax-rMin)
      const o = oMin + Math.random()*(oMax-oMin)
      // Soft star glow
      const g2 = ctx.createRadialGradient(x,y,0,x,y,r*3)
      g2.addColorStop(0, `rgba(220,225,255,${o})`)
      g2.addColorStop(1, 'rgba(0,0,0,0)')
      ctx.beginPath()
      ctx.arc(x,y,r*3,0,Math.PI*2)
      ctx.fillStyle = g2
      ctx.fill()
    }
  })

  // Grain — subtle noise
  for (let i=0; i<22000; i++) {
    const x = Math.random()*1080
    const y = Math.random()*1920
    const o = Math.random()*0.038
    ctx.fillStyle = `rgba(255,255,255,${o})`
    ctx.fillRect(x,y,1,1)
  }
})()

// ── Helpers ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id)
const t = ms => new Promise(r => setTimeout(r, ms))
const cl = (el,c) => el.classList
const add = (el,c) => el.classList.add(c)
const rem = (el,c) => el.classList.remove(c)

// ── Human-rhythm typing ──────────────────────────────────────────────────────
function humanType(el, text, onWord) {
  return new Promise(resolve => {
    el.innerHTML = '<span class="p-cursor"></span>'
    const cursor = el.querySelector('.p-cursor')
    let i = 0
    let prevChar = ''

    function next() {
      if (i >= text.length) { resolve(); return }
      const char = text[i]
      cursor.insertAdjacentText('beforebegin', char)
      i++

      // Trigger word glow on space or last char
      if ((char === ' ' || i === text.length) && onWord) onWord()

      // Human timing
      let delay = 48 + Math.random() * 52  // base 48–100ms
      if (prevChar === ' ') delay += 30     // pause after space
      if (char === ' ')     delay += 20     // pause before new word
      if (Math.random() < 0.07) delay += 160 // rare thinking pause
      if (i > 3 && i < text.length - 3) delay -= 8 // faster in middle

      prevChar = char
      setTimeout(next, Math.max(28, delay))
    }
    setTimeout(next, 180) // initial pause before typing
  })
}

// ── Pulse ring ───────────────────────────────────────────────────────────────
function spawnPulse(container) {
  const ring = document.createElement('div')
  ring.className = 'pulse-ring'
  container.appendChild(ring)
  setTimeout(() => ring.remove(), 1400)
}

// ── Reset ────────────────────────────────────────────────────────────────────
function resetAll() {
  ;['logoText','taglineText','phoneSecondary','phonePrimary',
    'secMask','secSweep','pQuestion','primResult','fade',
    'lineEnergy','lineEmotion','lineClarity',
    'bRow0','bRow1','bRow2'].forEach(id => rem($(id),'in'))

  rem($('phonePrimary'),'float')
  rem($('phoneSecondary'),'float')
  rem($('phonesContainer'),'push')
  rem($('pInputArea'),'glow')

  $('pTyped').innerHTML = '<span class="p-cursor"></span>'

  // Reset chart lines
  ;['lineEnergy','lineEmotion','lineClarity'].forEach(id => {
    $(id).style.transition = 'none'
    $(id).style.strokeDashoffset = '260'
  })

  // Remove any stray pulse rings
  document.querySelectorAll('.pulse-ring').forEach(e => e.remove())
}

// ── Animation sequence ───────────────────────────────────────────────────────
async function run() {
  resetAll()
  await t(200)

  // 1. Logo
  add($('logoText'),'in')
  await t(650)

  // 2. Tagline
  $('taglineText').style.transition = 'opacity 1s ease, transform 1s cubic-bezier(0.16,1,0.3,1)'
  add($('taglineText'),'in')
  await t(700)

  // 3. Secondary phone rotates in
  add($('phoneSecondary'),'in')
  await t(320)

  // 4. Primary phone rotates in
  add($('phonePrimary'),'in')
  await t(600)

  // 5. Start slow camera push
  add($('phonesContainer'),'push')

  // 6. "What's on your mind?" fades in
  add($('pQuestion'),'in')
  await t(750)

  // 7. Cursor blinks naturally for a beat (already blinking via CSS)
  await t(900)

  // 8. Type with human rhythm + word glow
  await humanType($('pTyped'), 'feeling scattered and low energy today', () => {
    add($('pInputArea'),'glow')
    setTimeout(() => rem($('pInputArea'),'glow'), 380)
  })

  await t(350)

  // 9. Completion pulse
  spawnPulse($('phonePrimary').querySelector('.phone-inner'))
  await t(200)

  // 10. Secondary phone mask reveal (analytics screen)
  add($('secMask'),'in')

  // 11. Animate chart lines staggered
  await t(300)
  ;['lineEnergy','lineEmotion','lineClarity'].forEach((id,idx) => {
    setTimeout(() => {
      const el = $(id)
      el.style.transition = `stroke-dashoffset 1.05s cubic-bezier(0.4,0,0.2,1)`
      add(el,'draw')
    }, idx * 220)
  })

  // 12. Label rows pop in
  await t(400)
  ;['bRow0','bRow1','bRow2'].forEach((id,idx) => {
    setTimeout(() => add($(id),'in'), idx * 180)
  })

  // 13. Light sweep on secondary
  await t(500)
  add($('secSweep'),'in')

  // 14. Show result on primary phone
  await t(300)
  add($('primResult'),'in')

  // 15. Start parallax float
  await t(200)
  add($('phonePrimary'),'float')
  add($('phoneSecondary'),'float')

  // 16. Hold (premium pacing)
  await t(2800)

  // 17. Fade out
  add($('fade'),'in')
  await t(1200)

  // 18. Loop
  run()
}

run()
</script>
</body>
</html>
