<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FLZ — Know Yourself Better</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  background:#000;
  width:100vw;height:100vh;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}

#stage{
  width:1080px;height:1920px;
  background:#050505;
  position:relative;overflow:hidden;
  transform-origin:top left;
}

/* bg canvases */
#particles,#grain{
  position:absolute;top:0;left:0;
  pointer-events:none;
}
#particles{width:1080px;height:1920px;z-index:1}
#grain{width:100%;height:100%;z-index:2;opacity:.4}

/* vignette */
#stage::after{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 42%,transparent 38%,rgba(0,0,0,.7) 100%);
  pointer-events:none;z-index:3;
}

/* ════════════ IPHONE 12 PRO ════════════ */
#phone-wrap{
  position:absolute;
  left:540px;top:848px;
  transform:translate(-50%,-50%) translateY(150px) scale(0.88);
  opacity:0;
  z-index:10;
  transition:opacity 1.2s ease,transform 1.5s cubic-bezier(0.16,1,0.3,1);
}
#phone-wrap.in{
  opacity:1;
  transform:translate(-50%,-50%) translateY(0) scale(1);
}
#phone-wrap.pull{
  transform:translate(-50%,-50%) translateY(-30px) scale(0.58);
  opacity:0;
  transition:opacity 1.1s ease,transform 1.3s cubic-bezier(0.4,0,0.2,1);
}

/* ambient glow beneath phone */
.phone-glow{
  position:absolute;
  bottom:-90px;left:50%;
  transform:translateX(-50%);
  width:460px;height:180px;
  background:radial-gradient(ellipse,rgba(90,90,200,.14) 0%,transparent 70%);
  pointer-events:none;z-index:-1;
}

/* phone body — graphite */
.iphone{
  width:452px;height:938px;
  position:relative;
  border-radius:52px;
  background:linear-gradient(158deg,#2d2d2f 0%,#1a1a1c 45%,#262628 100%);
  box-shadow:
    0 0 0 1.5px rgba(255,255,255,.07),
    inset 0 0 0 2px rgba(255,255,255,.04),
    0 60px 120px rgba(0,0,0,.95),
    0 20px 40px rgba(0,0,0,.75),
    0 0 80px rgba(70,70,160,.07);
}

/* stainless steel frame ring */
.iphone::before{
  content:'';
  position:absolute;inset:0;
  border-radius:52px;
  padding:2px;
  background:linear-gradient(162deg,
    #aaa 0%,#555 18%,#888 36%,#444 54%,#999 72%,#4a4a4a 90%,#888 100%);
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:destination-out;
  mask-composite:exclude;
}

/* screen inset */
.iscreen{
  position:absolute;
  top:10px;left:10px;right:10px;bottom:10px;
  border-radius:42px;
  background:#000;
  overflow:hidden;
}

/* notch */
.notch{
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:155px;height:32px;
  background:#000;
  border-radius:0 0 22px 22px;
  z-index:8;
}
.notch-cam{
  position:absolute;
  top:9px;left:50%;
  transform:translateX(-50%);
  width:11px;height:11px;
  background:#111;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.05);
}

/* home indicator */
.hbar{
  position:absolute;
  bottom:10px;left:50%;
  transform:translateX(-50%);
  width:132px;height:5px;
  background:rgba(255,255,255,.3);
  border-radius:3px;
  z-index:10;
}

/* side buttons */
.btn{position:absolute;border-radius:2px;background:linear-gradient(90deg,#282828,#545454,#282828)}
.bsl{left:-3px;top:104px;width:3px;height:38px}  /* silent */
.bvu{left:-3px;top:160px;width:3px;height:62px}  /* vol up */
.bvd{left:-3px;top:240px;width:3px;height:62px}  /* vol dn */
.bpw{right:-3px;top:192px;width:3px;height:82px} /* power */

/* screen images */
.sc-img{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  opacity:0;
  transition:opacity .9s ease;
  z-index:2;
}
.sc-img.on{opacity:1}

/* video behind images */
#sc-vid{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:top center;
  opacity:0;
  transition:opacity 1.1s ease;
  z-index:1;
}
#sc-vid.on{opacity:1}

/* screen top gradient (blend status bar with notch) */
.sc-top{
  position:absolute;
  top:0;left:0;right:0;height:56px;
  background:linear-gradient(#000 55%,transparent);
  z-index:7;pointer-events:none;
}

/* screen reflection */
.sc-ref{
  position:absolute;inset:0;
  background:linear-gradient(
    136deg,
    rgba(255,255,255,.048) 0%,
    transparent 36%,
    transparent 70%,
    rgba(255,255,255,.016) 100%
  );
  border-radius:42px;
  pointer-events:none;z-index:20;
}

/* ════════════ TEXT LAYERS ════════════ */
.tl{
  position:absolute;width:1080px;left:0;
  text-align:center;
  font-family:'Inter',sans-serif;
  pointer-events:none;z-index:30;
}

/* scene 1 */
#s1p{
  top:806px;
  font-size:50px;font-weight:200;
  color:rgba(255,255,255,.78);letter-spacing:-.2px;
  opacity:0;transition:opacity .8s ease;
}
#s1w{
  top:888px;
  font-size:80px;font-weight:100;letter-spacing:-3px;
  opacity:0;transition:opacity .5s ease;
}

/* phone labels */
.lbl{
  font-size:36px;font-weight:200;
  color:rgba(255,255,255,.72);letter-spacing:.3px;
  opacity:0;transform:translateY(13px);
  transition:opacity .75s ease,transform .85s cubic-bezier(0.16,1,0.3,1);
}
.lbl.on{opacity:1;transform:translateY(0)}

.lbl-s{
  font-size:23px;font-weight:200;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(255,255,255,.3);
  opacity:0;transform:translateY(8px);
  transition:opacity .65s ease .25s,transform .75s cubic-bezier(0.16,1,0.3,1) .25s;
}
.lbl-s.on{opacity:1;transform:translateY(0)}

#lbl3{top:320px}
#sub3{top:374px}
#lbl4{top:258px}
#sub4{top:312px}
#lbl5{top:270px}
#sub5{top:324px}

/* ════════════ PILLS ════════════ */
.pill{
  position:absolute;
  left:540px;top:1108px;
  transform:translate(-50%,-50%) scale(0.76);
  opacity:0;
  transition:opacity .7s ease,transform 1.1s cubic-bezier(0.16,1,0.3,1);
  z-index:28;
  display:flex;align-items:center;gap:9px;
  padding:13px 26px;
  border-radius:40px;
  font-family:'Inter',sans-serif;
  font-size:21px;font-weight:300;
  backdrop-filter:blur(14px);
  white-space:nowrap;
}
.pd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.ps{opacity:.45;margin:0 1px}

#pE{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.28);color:#F5A623}
#pM{background:rgba(107,107,255,.1);border:1px solid rgba(107,107,255,.28);color:#6B6BFF}
#pC{background:rgba(0,216,167,.1);border:1px solid rgba(0,216,167,.28);color:#00D8A7}

#pE .pd{background:#F5A623}
#pM .pd{background:#6B6BFF}
#pC .pd{background:#00D8A7}

/* pill fly-out positions */
#pE.out{opacity:1;transform:translate(calc(-50% - 308px),calc(-50% + 112px)) scale(1)}
#pM.out{opacity:1;transform:translate(-50%,calc(-50% - 100px)) scale(1)}
#pC.out{opacity:1;transform:translate(calc(-50% + 308px),calc(-50% + 112px)) scale(1)}

/* ════════════ END CARD ════════════ */
#end{
  position:absolute;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:50;opacity:0;
  background:#050505;   /* covers phone during end card */
  transition:opacity 1s ease;
}
#end.on{opacity:1}

.e-logo{
  font-family:'Inter',sans-serif;
  font-size:116px;font-weight:100;letter-spacing:-5px;color:#fff;
  margin-bottom:16px;
  opacity:0;transform:translateY(22px);
  transition:opacity .9s ease .1s,transform 1s cubic-bezier(0.16,1,0.3,1) .1s;
}
#end.on .e-logo{opacity:1;transform:translateY(0)}

.e-tag{
  font-family:'Inter',sans-serif;
  font-size:19px;font-weight:300;letter-spacing:6px;text-transform:uppercase;
  color:rgba(255,255,255,.38);
  margin-bottom:68px;
  opacity:0;transition:opacity .8s ease .35s;
}
#end.on .e-tag{opacity:1}

.e-btn{
  font-family:'Inter',sans-serif;
  font-size:25px;font-weight:300;letter-spacing:1px;
  color:rgba(255,255,255,.86);
  padding:17px 60px;
  border:1px solid rgba(255,255,255,.2);
  border-radius:50px;margin-bottom:26px;
  opacity:0;transform:translateY(10px);
  transition:opacity .7s ease .55s,transform .8s cubic-bezier(0.16,1,0.3,1) .55s;
}
#end.on .e-btn{opacity:1;transform:translateY(0)}

.e-dom{
  font-family:'Inter',sans-serif;
  font-size:19px;font-weight:200;letter-spacing:3px;
  color:rgba(255,255,255,.22);
  opacity:0;transition:opacity .6s ease .75s;
}
#end.on .e-dom{opacity:1}
</style>
</head>
<body>
<div id="stage">

  <canvas id="particles"></canvas>
  <canvas id="grain"></canvas>

  <!-- scene 1 words -->
  <div id="s1p" class="tl">Some days feel...</div>
  <div id="s1w" class="tl"></div>

  <!-- phone -->
  <div id="phone-wrap">
    <div class="iphone">
      <div class="btn bsl"></div>
      <div class="btn bvu"></div>
      <div class="btn bvd"></div>
      <div class="btn bpw"></div>
      <div class="ascreen"><!-- camera bump shadow top-left -->
      </div>
      <div class="iscreen">
        <div class="notch"><div class="notch-cam"></div></div>
        <div class="sc-top"></div>

        <!-- actual app screen recording -->
        <video id="sc-vid" autoplay muted playsinline loop src="app-recording.mp4"></video>

        <!-- screenshot overlays -->
        <img class="sc-img" id="sc1" src="screen1.jpeg" alt="FLZ home">
        <img class="sc-img" id="sc2" src="screen4.png"  alt="FLZ analysis">
        <img class="sc-img" id="sc3" src="screen2.png"  alt="FLZ history">

        <div class="sc-ref"></div>
        <div class="hbar"></div>
      </div>
    </div>
    <div class="phone-glow"></div>
  </div>

  <!-- scene labels -->
  <div id="lbl3" class="tl lbl">Just type how you feel.</div>
  <div id="sub3" class="tl lbl-s">No structure required</div>

  <div id="lbl4" class="tl lbl">FLZ reads what words can't say.</div>
  <div id="sub4" class="tl lbl-s">Energy &nbsp;·&nbsp; Emotion &nbsp;·&nbsp; Clarity</div>

  <div id="lbl5" class="tl lbl">See your patterns emerge.</div>
  <div id="sub5" class="tl lbl-s">Built from your entries</div>

  <!-- dimension pills -->
  <div class="pill" id="pE"><span class="pd"></span>Energy<span class="ps">·</span>Low</div>
  <div class="pill" id="pM"><span class="pd"></span>Emotion<span class="ps">·</span>Negative</div>
  <div class="pill" id="pC"><span class="pd"></span>Clarity<span class="ps">·</span>Focused</div>

  <!-- end card -->
  <div id="end">
    <div class="e-logo">FLZ.</div>
    <div class="e-tag">Know Yourself Better</div>
    <div class="e-btn">Start free</div>
    <div class="e-dom">feelz.chat</div>
  </div>

</div><!-- /stage -->

<script>
;(function(){

function $(id){return document.getElementById(id)}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function add(el,cls){if(el)el.classList.add(cls)}
function rem(el,cls){if(el)el.classList.remove(cls)}

/* ── fit stage to viewport ── */
function fit(){
  var s=$('stage')
  var sc=Math.min(window.innerWidth/1080,window.innerHeight/1920)
  s.style.transform='scale('+sc+')'
  s.style.position='absolute'
  s.style.left=Math.round((window.innerWidth-1080*sc)/2)+'px'
  s.style.top =Math.round((window.innerHeight-1920*sc)/2)+'px'
}
fit();window.addEventListener('resize',fit)

/* ── particles ── */
;(function(){
  var c=$('particles'),ctx=c.getContext('2d')
  c.width=1080;c.height=1920
  var pts=[]
  for(var i=0;i<55;i++){
    pts.push({
      x:Math.random()*1080,y:Math.random()*1920,
      r:.7+Math.random()*1.5,
      vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,
      a:.12+Math.random()*.28
    })
  }
  ;(function tick(){
    ctx.clearRect(0,0,1080,1920)
    pts.forEach(function(p){
      p.x+=p.vx;p.y+=p.vy
      if(p.x<0)p.x=1080;if(p.x>1080)p.x=0
      if(p.y<0)p.y=1920;if(p.y>1920)p.y=0
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
      ctx.fillStyle='rgba(255,255,255,'+p.a+')';ctx.fill()
    })
    requestAnimationFrame(tick)
  })()
})()

/* ── film grain ── */
;(function(){
  var c=$('grain'),ctx=c.getContext('2d')
  c.width=512;c.height=512
  ;(function drawGrain(){
    var img=ctx.createImageData(512,512),d=img.data
    for(var i=0;i<d.length;i+=4){var v=Math.random()*38|0;d[i]=d[i+1]=d[i+2]=v;d[i+3]=18}
    ctx.putImageData(img,0,0)
    setTimeout(drawGrain,55)
  })()
})()

/* ── cycling words ── */
var words=[
  {t:'unclear',  c:'rgba(255,255,255,.82)'},
  {t:'tired',    c:'rgba(245,166,35,.85)'},
  {t:'heavy',    c:'rgba(107,107,255,.85)'},
  {t:'restless', c:'rgba(0,216,167,.82)'}
]

function showWord(i){
  return new Promise(function(res){
    var el=$('s1w'),w=words[i]
    el.textContent=w.t;el.style.color=w.c;el.style.opacity='1'
    setTimeout(function(){
      el.style.opacity='0'
      setTimeout(res,480)
    },640)
  })
}

/* ── screen helpers ── */
var SCREENS=['sc1','sc2','sc3']
function screenOn(id){
  SCREENS.forEach(function(s){
    var el=$(s);if(!el)return
    s===id?add(el,'on'):rem(el,'on')
  })
}
function screenOff(){SCREENS.forEach(function(s){var el=$(s);if(el)rem(el,'on')})}

/* ── reset ── */
function freeze(id,extras){
  var el=$(id);if(!el)return
  el.style.transition='none';el.style.opacity='0'
  if(extras)Object.assign(el.style,extras)
}

function resetAll(){
  freeze('s1p');freeze('s1w');$('s1w').textContent=''

  ;['phone-wrap'].forEach(function(id){
    var el=$(id)
    rem(el,'in');rem(el,'pull')
    freeze(id,{transform:'translate(-50%,-50%) translateY(150px) scale(0.88)'})
  })

  screenOff();rem($('sc-vid'),'on')

  ;['lbl3','sub3','lbl4','sub4','lbl5','sub5'].forEach(function(id){
    var el=$(id);if(!el)return
    rem(el,'on')
    var isS=id.startsWith('sub')
    freeze(id,{transform:isS?'translateY(8px)':'translateY(13px)'})
  })

  ;['pE','pM','pC'].forEach(function(id){
    var el=$(id)
    rem(el,'out')
    freeze(id,{transform:'translate(-50%,-50%) scale(0.76)'})
  })

  rem($('end'),'on');freeze('end')

  /* force reflow */
  $('stage').offsetHeight

  /* clear inline styles → CSS base rules take over */
  requestAnimationFrame(function(){
    ;['s1p','s1w','phone-wrap',
      'lbl3','sub3','lbl4','sub4','lbl5','sub5',
      'pE','pM','pC','end','sc-vid',
      'sc1','sc2','sc3'].forEach(function(id){
        var el=$(id);if(!el)return
        el.style.transition='';el.style.opacity='';el.style.transform=''
      })
  })
}

/* ══════════════════════════════════════
   TIMELINE  (~19s loop)
══════════════════════════════════════ */
async function run(){

  resetAll()
  await sleep(120)

  /* ── S1: opening mood words  0–2.8s ── */
  $('s1p').style.opacity='1'
  await sleep(700)
  for(var i=0;i<words.length;i++){await showWord(i)}
  await sleep(180)
  $('s1p').style.opacity='0'

  /* ── S2: phone rises + home screen  2.8–6s ── */
  await sleep(280)
  add($('sc-vid'),'on')   /* video plays in background */
  screenOn('sc1')          /* home screen crossfades on top */
  add($('phone-wrap'),'in')
  await sleep(2600)

  /* ── S3: "just type" label  6–9.5s ── */
  add($('lbl3'),'on');add($('sub3'),'on')
  await sleep(3200)

  /* ── transition to analysis screen ── */
  rem($('lbl3'),'on');rem($('sub3'),'on')
  await sleep(520)
  screenOn('sc2')           /* dimension analysis */

  /* ── S4: pills fly out  9.8–13.5s ── */
  await sleep(420)
  add($('lbl4'),'on');add($('sub4'),'on')
  await sleep(700)
  $('pE').classList.add('out')
  await sleep(160)
  $('pM').classList.add('out')
  await sleep(160)
  $('pC').classList.add('out')
  await sleep(2600)

  /* ── transition: pills retract + history screen ── */
  $('pE').classList.remove('out')
  $('pM').classList.remove('out')
  $('pC').classList.remove('out')
  rem($('lbl4'),'on');rem($('sub4'),'on')
  await sleep(600)
  screenOn('sc3')           /* growth history */

  /* ── S5: patterns label  13.5–16.8s ── */
  await sleep(300)
  add($('lbl5'),'on');add($('sub5'),'on')
  await sleep(3000)

  /* ── S6: end card  16.8–19.8s ── */
  rem($('lbl5'),'on');rem($('sub5'),'on')
  add($('phone-wrap'),'pull')
  await sleep(750)
  add($('end'),'on')
  await sleep(3200)

  /* ── loop ── */
  rem($('end'),'on')
  await sleep(900)
  run()
}

document.fonts.ready.then(run)

})();
</script>
</body>
</html>
